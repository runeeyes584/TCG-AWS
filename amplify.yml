version: 1
applications:
  - appRoot: Front-end
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 20
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: Front-end/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - Front-end/.next/cache/**/*